name: Static baseline checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install optimizer test dependency
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check 'ortools>=9.15,<10'

      - name: Validate JSON and Python syntax
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          files = sorted(Path('.').rglob('*.json'))
          for path in files:
              with path.open('r', encoding='utf-8') as handle:
                  json.load(handle)
          print(f'Validated {len(files)} JSON files')
          PY
          python -m compileall -q almdina_erp

      - name: Validate Arabic and operator UX regressions
        shell: bash
        run: |
          python - <<'PY'
          from almdina_erp.tests import test_arabic_operator_localization as arabic_checks
          from almdina_erp.tests import test_door_cutting_order_operator_ux as ux_checks
          from almdina_erp.tests import test_cutting_plan_workspace_ux as plan_ux_checks
          from almdina_erp.tests import test_dxf_autocad_compatibility as dxf_checks

          modules = [arabic_checks, ux_checks, plan_ux_checks, dxf_checks]
          total = 0
          for module in modules:
              tests = [
                  getattr(module, name)
                  for name in dir(module)
                  if name.startswith('test_') and callable(getattr(module, name))
              ]
              for test in tests:
                  test()
              total += len(tests)
          print(f'Validated {total} Arabic/operator/plan/DXF regression checks')
          PY

      - name: Validate advanced cutting optimizer
        shell: bash
        run: |
          python - <<'PY'
          from almdina_erp.tests import test_advanced_cutting_optimizer as checks

          tests = [
              getattr(checks, name)
              for name in dir(checks)
              if name.startswith('test_') and callable(getattr(checks, name))
          ]
          for test in tests:
              print(f'Running {test.__name__}...')
              test()
          print(f'Validated {len(tests)} advanced optimizer regression checks')
          PY

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          count=0
          while IFS= read -r -d '' file; do
            node --check "$file"
            count=$((count + 1))
          done < <(find almdina_erp -type f -name '*.js' -print0)
          echo "Validated ${count} JavaScript files"
