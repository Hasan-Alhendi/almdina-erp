name: Static baseline checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate JSON and Python syntax
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          files = sorted(Path('.').rglob('*.json'))
          for path in files:
              with path.open('r', encoding='utf-8') as handle:
                  json.load(handle)
          print(f'Validated {len(files)} JSON files')
          PY
          python -m compileall -q almdina_erp

      - name: Validate Arabic factory operator localization
        shell: bash
        run: |
          python - <<'PY'
          from almdina_erp.tests import test_arabic_operator_localization as checks

          tests = [
              getattr(checks, name)
              for name in dir(checks)
              if name.startswith('test_') and callable(getattr(checks, name))
          ]
          for test in tests:
              test()
          print(f'Validated {len(tests)} Arabic operator localization checks')
          PY

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          count=0
          while IFS= read -r -d '' file; do
            node --check "$file"
            count=$((count + 1))
          done < <(find almdina_erp -type f -name '*.js' -print0)
          echo "Validated ${count} JavaScript files"
