name: Frappe v16 Integration

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "almdina_erp/**"
      - "pyproject.toml"
      - "setup.py"
      - "setup.cfg"
      - ".github/workflows/frappe-v16-integration.yml"

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15
      redis-cache:
        image: redis:7-alpine
        ports:
          - 13000:6379
      redis-queue:
        image: redis:7-alpine
        ports:
          - 11000:6379

    steps:
      - name: Checkout Almdina ERP
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mariadb-client \
            libmariadb-dev \
            libffi-dev \
            libssl-dev \
            wkhtmltopdf \
            xvfb \
            redis-tools
          sudo npm install -g yarn

      - name: Install Bench CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install frappe-bench

      - name: Initialize Frappe v16 bench
        run: |
          bench init "$RUNNER_TEMP/frappe-bench" \
            --frappe-branch version-16 \
            --python python3.12 \
            --skip-redis-config-generation

      - name: Install ERPNext v16 and local app source
        env:
          APP_SOURCE: ${{ github.workspace }}
        run: |
          cd "$RUNNER_TEMP/frappe-bench"
          bench get-app erpnext --branch version-16
          git clone "$APP_SOURCE" apps/almdina_erp
          ./env/bin/pip install -e apps/almdina_erp
          grep -qxF almdina_erp sites/apps.txt || echo almdina_erp >> sites/apps.txt

      - name: Configure Redis URLs
        run: |
          cd "$RUNNER_TEMP/frappe-bench"
          bench set-config -g redis_cache redis://127.0.0.1:13000
          bench set-config -g redis_queue redis://127.0.0.1:11000
          bench set-config -g redis_socketio redis://127.0.0.1:11000

      - name: Create integration site
        run: |
          cd "$RUNNER_TEMP/frappe-bench"
          bench new-site test.localhost \
            --db-host 127.0.0.1 \
            --db-root-username root \
            --db-root-password root \
            --admin-password admin \
            --no-mariadb-socket

      - name: Install ERPNext and Almdina ERP
        run: |
          cd "$RUNNER_TEMP/frappe-bench"
          bench --site test.localhost install-app erpnext
          bench --site test.localhost install-app almdina_erp

      - name: Run migrate twice for idempotency
        run: |
          cd "$RUNNER_TEMP/frappe-bench"
          bench --site test.localhost migrate
          bench --site test.localhost migrate

      - name: Verify installed apps and schema
        run: |
          cd "$RUNNER_TEMP/frappe-bench"
          bench --site test.localhost list-apps
          bench --site test.localhost execute frappe.get_all --kwargs '{"doctype":"DocType","filters":{"module":"Almdina ERP"},"pluck":"name"}'

      - name: Run Almdina ERP tests
        run: |
          cd "$RUNNER_TEMP/frappe-bench"
          bench --site test.localhost set-config allow_tests true
          bench --site test.localhost run-tests --app almdina_erp

      - name: Disable tests
        if: always()
        run: |
          cd "$RUNNER_TEMP/frappe-bench" || exit 0
          bench --site test.localhost set-config allow_tests false || true
