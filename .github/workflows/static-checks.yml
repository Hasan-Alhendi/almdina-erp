name: Static Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  static-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          files = sorted(Path('.').rglob('*.json'))
          errors = []
          for path in files:
              try:
                  with path.open('r', encoding='utf-8') as handle:
                      json.load(handle)
              except Exception as exc:
                  errors.append(f"{path}: {exc}")
          if errors:
              raise SystemExit("Invalid JSON:\n" + "\n".join(errors))
          print(f"Validated {len(files)} JSON files")
          PY

      - name: Validate Python syntax
        run: python -m compileall -q almdina_erp

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          count=0
          while IFS= read -r -d '' file; do
            node --check "$file"
            count=$((count + 1))
          done < <(find almdina_erp -type f -name '*.js' -print0)
          echo "Validated ${count} JavaScript files"
